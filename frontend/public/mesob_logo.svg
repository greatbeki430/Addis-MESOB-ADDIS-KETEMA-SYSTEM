<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2aaa78;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" stroke="#0d1f14" stroke-width="3"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- MESOB Text -->
  <text x="100" y="80" font-family="'Noto Serif Ethiopic', 'Times New Roman', serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">MESOB</text>
  
  <!-- Amharic text -->
  <text x="100" y="110" font-family="'Noto Sans Ethiopic', 'Arial', sans-serif" font-size="16" font-weight="bold" fill="#e8f5ee" text-anchor="middle">መሶብ</text>
  
  <!-- Small diamond shape -->
  <polygon points="100,120 105,128 100,136 95,128" fill="#ffd700"/>
  
  <!-- Stars -->
  <text x="50" y="60" font-size="12" fill="#ffd700" text-anchor="middle">★</text>
  <text x="150" y="60" font-size="12" fill="#ffd700" text-anchor="middle">★</text>
  <text x="50" y="150" font-size="10" fill="#e8f5ee" text-anchor="middle">✦</text>
  <text x="150" y="150" font-size="10" fill="#e8f5ee" text-anchor="middle">✦</text>
  
  <!-- Bottom text -->
  <text x="100" y="170" font-family="'Arial', sans-serif" font-size="8" font-weight="bold" fill="#e8f5ee" text-anchor="middle" letter-spacing="1">ONE-STOP</text>
  
  <!-- Small dots around -->
  <circle cx="65" cy="95" r="2" fill="#ffd700"/>
  <circle cx="135" cy="95" r="2" fill="#ffd700"/>
  <circle cx="80" cy="135" r="1.5" fill="#e8f5ee"/>
  <circle cx="120" cy="135" r="1.5" fill="#e8f5ee"/>
</svg>